services:
  - type: web
    name: taiwan-stock-analyzer
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_PATH
        value: data/stocks.db
      - key: HTTP_TIMEOUT_SECONDS
        value: "20"
      - key: USER_AGENT
        value: taiwan-stock-analyzer/0.1
